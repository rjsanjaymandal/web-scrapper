  host: "gw.dataimpulse.com:823"
  username: "1accade8fd4acb75b8ae"
  password: "c51e0887f7425452"

  # ===============================================
  # DATAIMPULSE ADVANCED CONFIG
  # ===============================================
  # Triples accuracy for government sites (BSE/SEBI) but 
  # doubles bandwidth cost ($2/GB instead of $1/GB).
