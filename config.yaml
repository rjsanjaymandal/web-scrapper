scraper_settings:
  # Some sites (JustDial, TradeIndia) block HTTP/2 connections from known proxies.
  # Forcing HTTP/1.1 improves success rate on these targets.
  force_http1_sources: ["JUSTDIAL", "TRADEINDIA", "INDIAMART", "AMFI"]
  max_retries: 5
  timeout: 60
  request_delay_min: 5
  request_delay_max: 15
  max_concurrent: 1
  max_pages_per_source: 3

distributed:
  batch_size: 1000
  write_interval: 30
  task_queue: "scraper:tasks"
  result_buffer: "scraper:results_buffer"

