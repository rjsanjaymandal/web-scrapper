scraper_settings:
  # Some sites (JustDial, TradeIndia) block HTTP/2 connections from known proxies.
  # Forcing HTTP/1.1 improves success rate on these targets.
  force_http1_sources: ["JUSTDIAL", "TRADEINDIA", "INDIAMART", "AMFI"]
  max_retries: 5
  timeout: 45