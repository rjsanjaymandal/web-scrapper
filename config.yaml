# ===============================================
# HIGH-VOLUME SCRAPER CONFIGURATION
# Target: 10 Lakh (1 Million) High-Quality Contacts
# ===============================================

database:
  host: localhost
  port: 5432
  name: scraper_db
  user: postgres
  password: your_password_here

proxy:
  # Add your proxy credentials here
  host: brd-customer-YOUR_CUSTOMER-zone-YOUR_ZONE
  username: your_username
  password: your_password
  proxies:
    - host: brd-customer-ZONE1-region
      username: user1
      password: pass1
    - host: brd-customer-ZONE2-region
      username: user2
      password: pass2
    - host: brd-customer-ZONE3-region
      username: user3
      password: pass3

scraper:
  # Rate limits per source type (in seconds)
  rate_limits:
    amfi: 0          # Official API - fastest
    irdai: 2         # Government site - moderate
    icai: 2          # Government site - moderate
    icsi: 2          # Government site - moderate
    sebi: 3          # Government site - careful
    nse: 3           # Stock exchange - careful
    bse: 3           # Stock exchange - careful
    justdial: 4      # Anti-bot protection
    indiamart: 4    # Anti-bot protection
    yellowpages: 3   # Moderate protection
    google_maps: 5   # Strong protection

  request_delay_min: 2
  request_delay_max: 5
  max_retries: 3
  timeout_seconds: 30
  headless: true
  test_mode: false
  export_csv: true
  csv_output_dir: exports
  enable_email_extraction: true
  enable_sitemap: false
  enable_deduplication: true
  enable_email_verify: false
  enable_enrichment: true
  scheduler_enabled: false
  scheduler_interval_hours: 24
  max_pages_per_source: 50  # Increased from 5 to 50
  dashboard_page_size: 50

  # Quality settings - only keep contacts with phone OR email
  quality_filter:
    require_phone_or_email: true
    min_name_length: 3
    skip_invalid_phones: true

categories:
  # Primary categories (financial services)
  - Insurance-Agents
  - Insurance-Advisor
  - Insurance-Consultant
  - Mutual-Fund-Agents
  - Mutual-Fund-Advisor
  - Tax-Advocates
  - Tax-Consultant
  - Chartered-Accountants
  - CA
  - Company-Secretaries
  - Stock-Brokers
  - SEBI-Registered
  - SEBI-Advisor
  - GST-Practitioners
  - GST-Consultant
  - RBI-Regulated
  - Banks
  - NBFC
  - Financial-Advisor
  - Wealth-Manager
  - Investment-Advisor
  # Business categories (high volume)
  - Business-Consultants
  - Chartered-Engineers
  - Cost-Accountants

